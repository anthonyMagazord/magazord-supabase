name: Atualizar Base Exact Spotter (Full - Leads)
on:
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: exact-spotter-supabase
  cancel-in-progress: false
jobs:
  leads:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas requests pyarrow sqlalchemy psycopg2-binary
      - name: Executar extrator (fase 1 - leads)
        env:
          EXACT_TOKEN: ${{ secrets.EXACT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: python extrator.py --leads
